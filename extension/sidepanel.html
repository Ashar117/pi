<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; flex-direction: column; height: 100vh;
         font-family: monospace; font-size: 13px; background: #0d0d0d; color: #d4d4d4; }

  #header { padding: 8px 12px; background: #111; border-bottom: 1px solid #222;
            display: flex; align-items: center; gap: 6px; }
  #mode-badge { padding: 2px 6px; background: #1e3a5f; color: #7eb8f7;
                font-size: 10px; border-radius: 3px; }
  #new-btn { margin-left: auto; padding: 2px 8px; background: #1a1a1a;
             border: 1px solid #333; color: #aaa; cursor: pointer;
             font-family: monospace; font-size: 11px; }

  #messages { flex: 1; overflow-y: auto; padding: 12px;
              display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 95%; padding: 7px 10px; border-radius: 4px; line-height: 1.5;
         white-space: pre-wrap; word-break: break-word; }
  .msg.user      { align-self: flex-end; background: #1e3a5f; color: #c8e0ff; }
  .msg.assistant { align-self: flex-start; background: #1a1a1a; color: #d4d4d4; }
  .msg.system    { align-self: center; color: #555; font-size: 11px; }

  #input-area { padding: 10px 12px; background: #111; border-top: 1px solid #222;
                display: flex; gap: 6px; }
  #input-text { flex: 1; padding: 6px 8px; background: #1a1a1a; border: 1px solid #333;
                color: #d4d4d4; font-family: monospace; font-size: 12px; resize: none;
                height: 32px; overflow: hidden; }
  #input-text:focus { outline: none; border-color: #4a7abf; }
  #send-btn { padding: 0 12px; background: #1e3a5f; color: #7eb8f7; border: none;
              cursor: pointer; font-family: monospace; font-size: 12px; }
  #send-btn:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>
<div id="header">
  <span id="mode-badge">root</span>
  <span style="color:#555;font-size:11px;" id="conv-label">Pi</span>
  <button id="new-btn">new</button>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input-text" placeholder="Ask Pi…" rows="1"></textarea>
  <button id="send-btn">→</button>
</div>

<script>
const BRAIN_URL = "http://127.0.0.1:7712";
const EXT_CONV_ID = "extension:default";
</script>
<script src="chat.js"></script>
<script>
let convId = EXT_CONV_ID;
const inputEl = document.getElementById("input-text");
const sendBtn = document.getElementById("send-btn");

function addMsg(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = text;
  const pane = document.getElementById("messages");
  pane.appendChild(el);
  pane.scrollTop = pane.scrollHeight;
  return el;
}

function send(text) {
  if (!text.trim()) return;
  inputEl.value = "";
  addMsg("user", text);
  sendBtn.disabled = true;
  const replyEl = addMsg("assistant", "…");
  let chunks = "";
  streamChat(
    text, convId,
    (c) => { chunks += c; replyEl.textContent = chunks; document.getElementById("messages").scrollTop = 99999; },
    () => { if (!chunks) replyEl.textContent = "(no response)"; sendBtn.disabled = false; },
    () => {
      sendChat(text, convId).then(d => {
        replyEl.textContent = d.response || "(no response)";
        document.getElementById("mode-badge").textContent = d.mode || "?";
        sendBtn.disabled = false;
      }).catch(e => { replyEl.textContent = "[Error] " + e.message; sendBtn.disabled = false; });
    }
  );
}

sendBtn.addEventListener("click", () => send(inputEl.value.trim()));
inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(inputEl.value.trim()); } });
inputEl.addEventListener("input", () => { inputEl.style.height = "32px"; inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + "px"; });

document.getElementById("new-btn").addEventListener("click", () => {
  convId = EXT_CONV_ID;
  document.getElementById("messages").innerHTML = "";
  addMsg("system", "New conversation.");
});

// Check for page context from context menu
chrome.storage.session.get("pi_page_context").then(data => {
  const ctx = data.pi_page_context;
  if (ctx && (ctx.selection || ctx.url)) {
    const prefix = buildPageContextPrefix(ctx.selection, ctx.url, ctx.title);
    chrome.storage.session.remove("pi_page_context");
    if (prefix) {
      inputEl.value = prefix;
      addMsg("system", "Page context loaded — add your question and send.");
    }
  }
}).catch(() => {});

// Health check
fetch(BRAIN_URL + "/health", { headers: authHeaders() }).then(r => r.json()).then(d => {
  document.getElementById("mode-badge").textContent = d.mode || "?";
}).catch(() => { addMsg("system", "Brain server not reachable at " + BRAIN_URL); });
</script>
</body>
</html>

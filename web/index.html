<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; height: 100vh; font-family: monospace; font-size: 13px;
         background: #0d0d0d; color: #d4d4d4; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 200px; min-width: 200px; background: #111; border-right: 1px solid #222;
             display: flex; flex-direction: column; overflow: hidden; }
  #sidebar h2 { padding: 12px; font-size: 11px; color: #666; text-transform: uppercase;
                letter-spacing: .05em; border-bottom: 1px solid #1a1a1a; }
  #conv-list { flex: 1; overflow-y: auto; }
  .conv-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #1a1a1a;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #aaa; }
  .conv-item:hover, .conv-item.active { background: #1a1a1a; color: #e8e8e8; }
  .conv-item .conv-date { font-size: 10px; color: #555; display: block; margin-top: 2px; }
  #new-chat-btn { margin: 10px; padding: 6px; background: #1a1a1a; border: 1px solid #333;
                  color: #aaa; cursor: pointer; font-family: monospace; font-size: 12px; }
  #new-chat-btn:hover { background: #252525; color: #d4d4d4; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #header { padding: 10px 16px; background: #111; border-bottom: 1px solid #222;
            display: flex; align-items: center; gap: 8px; }
  #mode-badge { padding: 2px 6px; background: #1e3a5f; color: #7eb8f7;
                font-size: 10px; border-radius: 3px; }
  #token-input { margin-left: auto; padding: 3px 6px; background: #1a1a1a;
                 border: 1px solid #333; color: #aaa; font-family: monospace;
                 font-size: 11px; width: 140px; }
  #token-input::placeholder { color: #444; }

  /* Messages */
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex;
              flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 8px 12px; border-radius: 4px; line-height: 1.5;
         white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #1e3a5f; color: #c8e0ff; }
  .msg.assistant { align-self: flex-start; background: #1a1a1a; color: #d4d4d4; }
  .msg.system { align-self: center; color: #555; font-size: 11px; font-style: italic; }

  /* Input */
  #input-area { padding: 12px 16px; background: #111; border-top: 1px solid #222;
                display: flex; gap: 8px; }
  #input-text { flex: 1; padding: 8px 10px; background: #1a1a1a; border: 1px solid #333;
                color: #d4d4d4; font-family: monospace; font-size: 13px; resize: none;
                height: 36px; overflow: hidden; }
  #input-text:focus { outline: none; border-color: #4a7abf; }
  #send-btn { padding: 0 16px; background: #1e3a5f; color: #7eb8f7; border: none;
              cursor: pointer; font-family: monospace; font-size: 13px; }
  #send-btn:hover { background: #2a4e7f; }
  #send-btn:disabled { opacity: .4; cursor: default; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Pi</h2>
  <button id="new-chat-btn">+ New chat</button>
  <div id="conv-list"></div>
</div>

<div id="main">
  <div id="header">
    <span id="mode-badge">root</span>
    <span id="conv-title" style="color:#666;font-size:11px;">new conversation</span>
    <input id="token-input" type="password" placeholder="Bearer token (optional)">
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="input-text" placeholder="Message Pi…" rows="1"></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const BRAIN_URL = "http://127.0.0.1:7712";
</script>
<script src="/static/chat.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentConvId = null;

// ── Token ──────────────────────────────────────────────────────────────────
const tokenInput = document.getElementById("token-input");
tokenInput.value = getToken();
tokenInput.addEventListener("change", () => setToken(tokenInput.value.trim()));

// ── Conversations sidebar ──────────────────────────────────────────────────
async function loadConversations() {
  try {
    const convs = await fetchConversations();
    const list = document.getElementById("conv-list");
    list.innerHTML = "";
    convs.forEach(c => {
      const el = document.createElement("div");
      el.className = "conv-item" + (c.id === currentConvId ? " active" : "");
      el.dataset.id = c.id;
      const date = c.last_active_at ? c.last_active_at.slice(0,10) : "";
      el.innerHTML = `<span>${escHtml(c.title || "(untitled)")}</span><span class="conv-date">${date}</span>`;
      el.addEventListener("click", () => selectConversation(c.id, c.title));
      list.appendChild(el);
    });
  } catch(e) { /* sidebar non-fatal */ }
}

function selectConversation(id, title) {
  currentConvId = id;
  document.getElementById("conv-title").textContent = title || id;
  document.querySelectorAll(".conv-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === id);
  });
  document.getElementById("messages").innerHTML = "";
  addMsg("system", `Resumed conversation: ${id}`);
}

document.getElementById("new-chat-btn").addEventListener("click", () => {
  currentConvId = null;
  document.getElementById("messages").innerHTML = "";
  document.getElementById("conv-title").textContent = "new conversation";
  document.querySelectorAll(".conv-item").forEach(el => el.classList.remove("active"));
  addMsg("system", "New conversation started.");
});

// ── Messages ───────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const el = document.createElement("div");
  el.className = "msg " + role;
  el.textContent = text;
  const pane = document.getElementById("messages");
  pane.appendChild(el);
  pane.scrollTop = pane.scrollHeight;
  return el;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Send ───────────────────────────────────────────────────────────────────
const inputEl = document.getElementById("input-text");
const sendBtn = document.getElementById("send-btn");

function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = "";
  addMsg("user", text);
  sendBtn.disabled = true;

  const replyEl = addMsg("assistant", "…");

  let chunks = "";
  streamChat(
    text, currentConvId,
    (chunk) => { chunks += chunk; replyEl.textContent = chunks; document.getElementById("messages").scrollTop = 99999; },
    () => {
      if (!chunks) replyEl.textContent = "(no response)";
      sendBtn.disabled = false;
      loadConversations();
      // If we didn't have a conv ID yet, get it from the next chat response
    },
    (err) => {
      // Fallback to non-streaming
      sendChat(text, currentConvId).then(d => {
        replyEl.textContent = d.response || "(no response)";
        currentConvId = d.conversation_id;
        document.getElementById("conv-title").textContent = currentConvId;
        document.getElementById("mode-badge").textContent = d.mode || "?";
        sendBtn.disabled = false;
        loadConversations();
      }).catch(e => {
        replyEl.textContent = "[Error] " + e.message;
        sendBtn.disabled = false;
      });
    }
  );
}

sendBtn.addEventListener("click", send);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});

// Auto-resize textarea
inputEl.addEventListener("input", () => {
  inputEl.style.height = "36px";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});

// ── Init ───────────────────────────────────────────────────────────────────
loadConversations();
fetch(BRAIN_URL + "/health", { headers: authHeaders() }).then(r => r.json()).then(d => {
  document.getElementById("mode-badge").textContent = d.mode || "?";
}).catch(() => {});
</script>
</body>
</html>
